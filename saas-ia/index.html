<!doctype html>
<html lang="es">
    
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi IA SaaS - Panel de Control</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>

  <body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <h2>IA Master</h2>
            </div>
            <nav class="menu-lateral">
                <button>+ Nuevo Chat</button>
                <div class="historial">
                    <p>Historia reciente ...</p>
                    <ul>
                        <li>¿Cómo hacer dieta?</li>
                        <li>Receta de pizza</li>
                    </ul>
                </div>
            </nav>
            <div class="perfil">
                <span>Usuario Pro</span>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <h3>Conversación Actual</h3>
            </header>

            <!-- ===================================================================== -->
            <!-- Controles Superiores: Búsqueda y Filtros -->
            <!-- ===================================================================== -->
            <div class="buscador-container">
                <input type="text" id="input-busqueda" placeholder="Buscar en el chat...">
                <button onclick="buscarMensaje()">Buscar</button>
            </div>
            
            <div class="controles-filtros">
                <button onclick="mostrarTodo()">Ver Todo</button>
                <button onclick="verMisMensajes()">Mis Mensajes</button>
                <button onclick="modoGritar()">Modo Mayúsculas</button>
                
                <!-- El botón de borrar ahora usa la clase "btn-peligro" para el color rojo -->
                <button class="btn-peligro" onclick="if(confirm('¿Estás seguro de que quieres borrar TODO el historial?')) borrarChat()">
                    🗑️ Borrar Chat
                </button>
            </div>
            
            <section class="mensajes-container" id="caja-mensajes"></section>

            <footer class="input-area">
                <form class="chat-form" onsubmit="enviarPrompt(event)">
                    <label for="mensaje-input" class="sr-only">Mensaje</label>
                    <input 
                        type="text" 
                        id="mensaje-input" 
                        placeholder="Escribe tu pregunta aqui ..."
                        autocomplete="off" >
                    <button type="submit">Enviar</button>
                </form>
            </footer>
        </main>
    </div>
  </body>
</html>
